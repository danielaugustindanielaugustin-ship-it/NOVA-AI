/* ============================================================
   NOVA AI â€” DESIGN SYSTEM & CSS ARCHITECTURE
   Premium futuristic AI SaaS application
   ============================================================ */
/* â”€â”€ CSS Variables / Design Tokens â”€â”€ */
:root {
  /* Core palette â€” deep space aesthetic */
  --nova-void: #05050a;
  --nova-deep: #0a0a14;
  --nova-surface: #10101e;
  --nova-elevated: #16162a;
  --nova-card: #1c1c32;
  --nova-border: rgba(120,120,255,0.12);
  --nova-border-bright: rgba(120,120,255,0.28);
  /* Accent spectrum */
  --nova-primary: #6c63ff;
  --nova-primary-glow: rgba(108,99,255,0.35);
  --nova-cyan: #00d4ff;
  --nova-cyan-glow: rgba(0,212,255,0.25);
  --nova-emerald: #00e5a0;
  --nova-emerald-glow: rgba(0,229,160,0.2);
  --nova-amber: #ffb547;
  --nova-rose: #ff4d8f;
  --nova-rose-glow: rgba(255,77,143,0.25);
  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  /* Text scale */
  --text-primary: #f0f0ff;
  --text-secondary: #8888bb;
  --text-muted: #444466;
  /* Gradients */
  --grad-primary: linear-gradient(135deg, #6c63ff 0%, #00d4ff 100%);
  --grad-glow: linear-gradient(135deg, rgba(108,99,255,0.15) 0%, rgba(0,212,255,0.08) 100%);
  --grad-card: linear-gradient(145deg, rgba(28,28,50,0.9) 0%, rgba(16,16,30,0.95) 100%);
  /* Spacing */
  --sidebar-w: 260px;
  --topbar-h: 62px;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  /* Transitions */
  --ease-out: cubic-bezier(0.16,1,0.3,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
}
/* Light mode overrides */
[data-theme="light"] {
  --nova-void: #f5f5ff;
  --nova-deep: #ededfa;
  --nova-surface: #e8e8f5;
  --nova-elevated: #dfdff0;
  --nova-card: #d8d8ec;
  --nova-border: rgba(108,99,255,0.15);
  --nova-border-bright: rgba(108,99,255,0.3);
  --text-primary: #0d0d1a;
  --text-secondary: #4444aa;
  --text-muted: #9999cc;
  --grad-card: linear-gradient(145deg, rgba(216,216,240,0.9) 0%, rgba(230,230,248,0.95) 100%);
}
/* â”€â”€ Reset & Base â”€â”€ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body);
  background: var(--nova-void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}
/* â”€â”€ Scrollbar â”€â”€ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.4); border-radius: 99px; }
