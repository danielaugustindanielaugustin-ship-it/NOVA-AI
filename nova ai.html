```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nova AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#7c3aed);
color:white;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
}

.logo{
font-size:35px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero span{
color:#60a5fa;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

input,select,textarea{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#7c3aed;
color:white;
cursor:pointer;
margin-top:15px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
margin-top:20px;
backdrop-filter:blur(10px);
}

.result{
margin-top:20px;
padding:15px;
background:#111827;
border-radius:10px;
}

img{
max-width:100%;
border-radius:10px;
margin-top:15px;
}
</style>
</head>

<body>

<header>
<div class="logo">NOVA AI</div>

<nav>
<a href="#">Home</a>
<a href="#">Image AI</a>
<a href="#">Video AI</a>
<a href="#">Chat AI</a>
</nav>
</header>

<section class="hero">
<h1>Create Anything With <span>Nova AI</span></h1>
<p>AI Chat, AI Image, AI Video & Multi Language Support</p>
</section>

<div class="container">

<div class="card">
<h2>🤖 AI Chat</h2>

<textarea id="chatPrompt"
placeholder="Ask Nova AI..."
rows="4"></textarea>

<button onclick="chatAI()">Generate Answer</button>

<div class="result" id="chatResult"></div>
</div>

<div class="card">
<h2>🎨 AI Image Generator</h2>

<input type="text"
id="imagePrompt"
placeholder="Enter image prompt">

<button onclick="generateImage()">
Generate Image
</button>

<div id="imageResult"></div>
</div>

<div class="card">
<h2>🎥 AI Video Generator</h2>

<input type="text"
id="videoPrompt"
placeholder="Enter video prompt">

<button onclick="generateVideo()">
Generate Video
</button>

<div class="result" id="videoResult"></div>
</div>

<div class="card">
<h2>🌍 Language</h2>

<select id="language">
<option>English</option>
<option>தமிழ்</option>
<option>Hindi</option>
<option>Telugu</option>
<option>Malayalam</option>
<option>Kannada</option>
<option>French</option>
<option>German</option>
<option>Spanish</option>
<option>Arabic</option>
<option>Chinese</option>
<option>Japanese</option>
<option>Korean</option>
</select>
</div>

</div>

<script>

function chatAI(){

let prompt =
document.getElementById("chatPrompt").value;

document.getElementById("chatResult").innerHTML=
"Nova AI Response:<br><br>" +
"This is a demo response for: <b>"+prompt+"</b>";

}

function generateImage(){

let prompt =
document.getElementById("imagePrompt").value;

document.getElementById("imageResult").innerHTML=
`
<h3>Generated Image</h3>
<img src="https://picsum.photos/800/500?random=${Math.random()}">
<p>${prompt}</p>
`;

}

function generateVideo(){

let prompt =
document.getElementById("videoPrompt").value;

document.getElementById("videoResult").innerHTML=
"Video generation started for: <b>"+prompt+"</b><br><br>Demo Version";

}

</script>

</body>
</html>
```
